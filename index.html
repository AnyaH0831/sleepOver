<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleepover - Dream Journal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
        font-size: 28px;
      }

      .dream-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      textarea {
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        font-family: inherit;
        resize: vertical;
        min-height: 200px;
        transition: border-color 0.2s;
      }

      textarea:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
      }

      button {
        padding: 12px 24px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #0056b3;
      }

      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .message {
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        margin-top: 15px;
      }

      .success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Dream Journal</h1>
      
      <form class="dream-form" id="dreamForm">
        <textarea 
          id="dreamInput" 
          placeholder="Write your dream here..." 
          required
        ></textarea>
        <button type="submit">Save Dream</button>
      </form>

      <div id="message"></div>
      <div id="videoContainer" style="margin-top: 30px;"></div>
    </div>

    <script type="module">
      import { generateDreamVideo, pollVideoJob } from './api.js'

      const form = document.getElementById('dreamForm')
      const dreamInput = document.getElementById('dreamInput')
      const messageDiv = document.getElementById('message')
      const videoContainer = document.getElementById('videoContainer')

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        
        const dreamText = dreamInput.value.trim()
        if (!dreamText) return

        const button = form.querySelector('button')
        button.disabled = true
        button.textContent = 'Processing...'
        messageDiv.innerHTML = ''
        videoContainer.innerHTML = ''

        try {
          // Generate video with Magic Hour
          messageDiv.innerHTML = `<div class="message success">Creating your dream video...</div>`
          const { jobId } = await generateDreamVideo(dreamText)
          console.log('Job created:', jobId)

          // Poll backend for video
          messageDiv.innerHTML = `<div class="message success">Generating video... this usually takes 1-2 minutes</div>`
          const result = await pollVideoJob(jobId)
          
          if (result.status === 'complete' && result.videoUrl) {
            messageDiv.innerHTML = `<div class="message success">✨ Your dream video is ready!</div>`
            videoContainer.innerHTML = `
              <video width="100%" controls style="margin-top: 20px; border-radius: 8px; max-width: 600px;">
                <source src="${result.videoUrl}" type="video/mp4">
                Your browser does not support the video tag.
              </video>
            `
          } else if (result.status === 'timeout') {
            messageDiv.innerHTML = `<div class="message success">Video is still generating. <a href="https://app.magichour.ai" target="_blank">Check on Magic Hour</a></div>`
          } else if (result.status === 'error') {
            messageDiv.innerHTML = `<div class="message error">Error: ${result.error}</div>`
          } else {
            messageDiv.innerHTML = `<div class="message error">Unexpected response: ${JSON.stringify(result)}</div>`
          }
          
          dreamInput.value = ''
        } catch (error) {
          messageDiv.innerHTML = `<div class="message error">Error: ${error.message}</div>`
          console.error(error)
        } finally {
          button.disabled = false
          button.textContent = 'Save Dream'
        }
      })
    </script>
  </body>
</html>
